<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADI Chain · L2 Benchmark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════════════════════════════════════
       DatumLabs TUI tokens, ported from datumlabs-sdk/dashboard-kit
       (src/theme/globals.css). Light-mode only, monospace-first.
       ════════════════════════════════════════════════════════════════ */
    :root {
      /* Dark terminal surface (default) */
      --background:   #0A0B0E;
      --foreground:   #E8EAEF;
      --card:         #12141A;
      --card-hover:   #1A1D24;
      --panel-header: #0E1014;
      --border:        rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.14);
      --text-muted:    #7C828F;
      --text-dim:      #4F5460;
      /* Hover / overlay tints used by chart gridlines, table hovers etc.
         These flip between themes. */
      --tint-soft:     rgba(255,255,255,0.04);
      --tint-medium:   rgba(255,255,255,0.06);
      --tint-strong:   rgba(255,255,255,0.20);
      /* Brand accents, calibrated for dark surface */
      --accent-orange: #FF8B4D;
      --accent-red:    #FF5A5F;
      --accent-blue:   #4F7CFF;
      --accent-green:  #2ECC71;
      --accent-yellow: #F5B544;
      --accent-purple: #B266FF;
      --accent-cyan:   #00CFE8;
      /* Fonts */
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    }

    /* Light mode override */
    body[data-theme="light"] {
      --background:   #F6F7FA;
      --foreground:   #0F1115;
      --card:         #FFFFFF;
      --card-hover:   #EEF0F4;
      --panel-header: #FAFBFC;
      --border:        rgba(15,17,21,0.08);
      --border-bright: rgba(15,17,21,0.16);
      --text-muted:    #5B6373;
      --text-dim:      #9098A6;
      --tint-soft:     rgba(15,17,21,0.03);
      --tint-medium:   rgba(15,17,21,0.06);
      --tint-strong:   rgba(15,17,21,0.20);
      /* Accents tuned for white surface (slightly darker for AA contrast) */
      --accent-orange: #E55A1F;
      --accent-red:    #D6322E;
      --accent-blue:   #3B5FE0;
      --accent-green:  #0F9D58;
      --accent-yellow: #D97706;
      --accent-purple: #9B4AE0;
      --accent-cyan:   #0090B2;
    }

    /* Brand tile reads orange on white in light mode */
    body[data-theme="light"] .sidebar-brand { color: #FFFFFF; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── Scrollbar (thin, like the SDK) ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--background); }
    ::-webkit-scrollbar-thumb { background: rgba(15,17,21,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(15,17,21,0.25); }

    /* ════════════════════════════════════════════════════════════════
       Layout shell, top nav, main, status bar
       ════════════════════════════════════════════════════════════════ */
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 56px 1fr;
      grid-template-rows: 32px 36px 1fr 28px;
      grid-template-areas:
        "sidebar ticker"
        "sidebar topnav"
        "sidebar main"
        "sidebar statusbar";
    }
    .sidebar-nav {
      grid-area: sidebar;
      background: var(--panel-header);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 4px;
    }
    .sidebar-brand {
      width: 36px; height: 36px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent-orange), #FFA56C);
      display: flex; align-items: center; justify-content: center;
      color: #0A0B0E; font-weight: 800; font-size: 12px;
      letter-spacing: 0.04em; margin-bottom: 12px;
    }
    .sidebar-item {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      cursor: pointer; position: relative;
      color: var(--text-muted);
      transition: color .12s ease, background .12s ease;
    }
    .sidebar-item:hover {
      color: var(--accent-orange);
      background: rgba(255,139,77,0.08);
    }
    .sidebar-item.active {
      color: var(--accent-orange);
      background: rgba(255,139,77,0.12);
    }
    .sidebar-item.active::before {
      content: ""; position: absolute; left: -10px; top: 8px; bottom: 8px;
      width: 2px; background: var(--accent-orange); border-radius: 2px;
    }
    .sidebar-item .tip {
      position: absolute; left: 48px; top: 50%; transform: translateY(-50%);
      background: var(--card); color: var(--foreground);
      padding: 4px 10px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.06em; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .12s ease;
      border: 1px solid var(--border-bright);
      z-index: 50;
    }
    .sidebar-item:hover .tip { opacity: 1; }
    .sidebar-item .kbd-mini {
      position: absolute; right: 2px; bottom: 2px;
      font-size: 7.5px; color: var(--text-dim);
      font-family: var(--font-mono); font-weight: 600;
    }
    .sidebar-spacer { flex: 1; }

    /* Top nav now smaller, just for cmd-palette + LIVE indicator */
    .top-nav {
      grid-area: topnav;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .top-nav-inner {
      max-width: 100%; margin: 0;
      padding: 0 16px;
      height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ticker { grid-area: ticker; }
    .main-wrap { grid-area: main; overflow: auto; }
    .status-bar { grid-area: statusbar; }
    .brand-cluster { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 22px; height: 22px; border-radius: 3px;
      background: linear-gradient(135deg, var(--accent-orange), #FF8A5C);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 11px; letter-spacing: 0.04em;
    }
    .brand-sep { color: var(--text-muted); font-size: 10px; }
    .brand-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--text-muted);
    }
    .nav-cluster { display: flex; align-items: center; gap: 16px; }
    .nav-items { display: flex; align-items: center; gap: 2px; }
    .nav-link {
      padding: 5px 10px; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); border-radius: 3px;
      border-bottom: 1px solid transparent;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
      cursor: pointer;
    }
    .nav-link:hover { color: var(--foreground); }
    .nav-link.active {
      color: var(--accent-orange);
      background: rgba(255,107,53,0.08);
      border-bottom: 1px solid var(--accent-orange);
    }
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .export-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 4px 10px; border: 1px solid var(--border-bright);
      border-radius: 3px; background: var(--card);
      cursor: pointer; transition: all .15s ease;
      font-family: var(--font-mono);
    }
    .export-btn:hover { border-color: var(--accent-orange); color: var(--accent-orange); }
    .export-btn:disabled { opacity: 0.5; cursor: wait; }

    /* ════════════════════════════════════════════════════════════════
       Chart toolbar (ChartWrapper pattern)
       ════════════════════════════════════════════════════════════════ */
    .chart-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .time-pills { display: flex; gap: 4px; }
    .time-pill {
      padding: 4px 10px; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
      border: 1px solid var(--border); border-radius: 3px;
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all .15s ease;
      font-family: var(--font-mono);
    }
    .time-pill:hover { border-color: var(--border-bright); color: var(--foreground); }
    .time-pill.active { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(255,107,53,0.08); }
    .chart-actions { display: flex; gap: 4px; align-items: center; }
    .chart-action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border: 1px solid var(--border); border-radius: 3px;
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all .15s ease;
    }
    .chart-action-btn:hover { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(255,107,53,0.06); }
    .chart-actions-sep { width: 1px; height: 14px; background: var(--border); margin: 0 4px; }
    .chart-canvas {
      position: relative;
      background: var(--card);
    }
    .chart-watermark {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      font-family: var(--font-mono); font-size: 64px; font-weight: 700;
      letter-spacing: 0.16em; color: var(--foreground);
      opacity: 0.035; text-transform: uppercase;
    }
    .chart-footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--panel-header);
      font-size: 11px; color: var(--text-muted);
      display: flex; gap: 18px; flex-wrap: wrap;
    }
    .chart-footer .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .chart-footer .legend-sw { display: inline-block; width: 18px; height: 3px; }
    .chart-footer .legend-band { display: inline-block; width: 14px; height: 10px; border: 1px solid var(--border); }
    .read-note {
      margin: 0; padding: 12px 14px;
      background: var(--panel-header);
      border-top: 1px solid var(--border);
      font-family: var(--font-sans); font-size: 12.5px; line-height: 1.6;
      color: var(--text-muted);
    }
    .read-note strong { color: var(--foreground); }
    .read-note .danger-text { color: var(--accent-red); font-weight: 600; }

    /* ════════════════════════════════════════════════════════════════
       Report pages, paper-styled prose pages
       ════════════════════════════════════════════════════════════════ */
    .report-stack { display: grid; gap: 24px; }
    .report-page {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 56px 56px;
      position: relative;
      overflow: hidden;
      max-width: 920px;
      margin: 0 auto;
      width: 100%;
    }
    .report-page::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.45;
    }
    .report-meta {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: var(--font-mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--text-muted); margin-bottom: 22px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .report-meta .label { color: var(--accent-orange); font-weight: 700; }
    .report-h1 {
      font-family: var(--font-sans);
      font-size: 28px; font-weight: 700; letter-spacing: -0.015em;
      color: var(--foreground); margin: 0 0 8px;
    }
    .report-lede {
      font-family: var(--font-sans);
      font-size: 15px; line-height: 1.6; color: var(--text-muted);
      margin: 0 0 28px; max-width: 60ch;
    }
    .report-h2 {
      font-family: var(--font-sans);
      font-size: 17px; font-weight: 700;
      color: var(--foreground); margin: 28px 0 10px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .report-h2:first-of-type { padding-top: 0; border-top: none; margin-top: 0; }
    .report-h2 .num {
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.1em; color: var(--accent-orange);
      margin-right: 10px; font-weight: 700;
    }
    .report-p {
      font-family: var(--font-sans);
      font-size: 14.5px; line-height: 1.7; color: var(--foreground);
      margin: 0 0 14px; max-width: 70ch;
    }
    .report-p.muted { color: var(--text-muted); }
    .report-p b { color: var(--foreground); font-weight: 600; }
    .report-callout {
      background: rgba(255,107,53,0.06);
      border-left: 3px solid var(--accent-orange);
      padding: 14px 18px; border-radius: 0 4px 4px 0;
      margin: 14px 0 18px;
      font-family: var(--font-sans); font-size: 14px; line-height: 1.65;
      color: var(--foreground);
    }
    .report-callout strong { color: var(--accent-orange); }
    .report-callout.danger {
      background: rgba(214,50,46,0.06);
      border-left-color: var(--accent-red);
    }
    .report-callout.danger strong { color: var(--accent-red); }
    .report-figures {
      display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px;
      margin: 18px 0 22px;
      padding: 16px;
      background: var(--panel-header); border-radius: 4px;
      border: 1px solid var(--border);
    }
    .report-fig {
      padding: 4px 12px; border-left: 2px solid var(--border);
    }
    .report-fig:first-child { border-left: none; padding-left: 4px; }
    .report-fig .l {
      font-family: var(--font-mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); margin-bottom: 4px;
    }
    .report-fig .v {
      font-family: var(--font-mono); font-size: 18px; font-weight: 700;
      color: var(--foreground); font-variant-numeric: tabular-nums;
    }
    .report-fig .v.danger { color: var(--accent-red); }
    .report-fig .s {
      font-family: var(--font-sans); font-size: 11px;
      color: var(--text-muted); margin-top: 2px;
    }
    .report-list {
      margin: 0 0 16px; padding: 0; list-style: none;
      display: grid; gap: 12px;
    }
    .report-list li {
      display: grid; grid-template-columns: 28px 1fr; gap: 12px;
      font-family: var(--font-sans); font-size: 14.5px; line-height: 1.6;
      color: var(--foreground);
    }
    .report-list .num {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--accent-orange); font-weight: 700;
      padding-top: 4px;
    }
    .report-list b { color: var(--foreground); font-weight: 600; }
    .report-footer {
      margin-top: 28px; padding-top: 14px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
      display: flex; justify-content: space-between;
    }
    @media (max-width: 768px) {
      .report-page { padding: 28px 22px 32px; }
      .report-h1 { font-size: 22px; }
      .report-figures { grid-template-columns: repeat(2, 1fr); }
    }

    /* ════════════════════════════════════════════════════════════════
       Ticker bar (Bloomberg-style scrolling top strip)
       ════════════════════════════════════════════════════════════════ */
    .ticker {
      background: var(--panel-header);
      border-bottom: 1px solid var(--border);
      overflow: hidden; height: 32px;
      display: flex; align-items: center;
      font-family: var(--font-mono); font-size: 11.5px;
      position: relative;
    }
    .ticker-inner {
      display: inline-flex; gap: 28px; padding: 0 16px;
      animation: ticker-scroll 50s linear infinite;
      white-space: nowrap;
    }
    .ticker:hover .ticker-inner { animation-play-state: paused; }
    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-item { display: inline-flex; gap: 6px; align-items: center; }
    .ticker-item .l {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .ticker-item .v { color: var(--foreground); font-weight: 600; }
    .ticker-item .v.up   { color: var(--accent-green); }
    .ticker-item .v.down { color: var(--accent-red); }
    .ticker-item .v.warn { color: var(--accent-yellow); }
    .ticker-sep { color: var(--text-dim); }

    /* ════════════════════════════════════════════════════════════════
       Terminal grid, Bloomberg-style multi-panel layout
       ════════════════════════════════════════════════════════════════ */
    .term-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      padding: 10px;
    }
    .w-3  { grid-column: span 3; }
    .w-4  { grid-column: span 4; }
    .w-5  { grid-column: span 5; }
    .w-6  { grid-column: span 6; }
    .w-7  { grid-column: span 7; }
    .w-8  { grid-column: span 8; }
    .w-9  { grid-column: span 9; }
    .w-12 { grid-column: span 12; }

    .widget {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex; flex-direction: column;
      min-height: 0;
      position: relative;
    }
    .widget::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.32;
    }
    .widget-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px;
      background: var(--panel-header);
      border-bottom: 1px solid var(--border);
      min-height: 28px;
    }
    .widget-title {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--accent-orange);
    }
    .widget-meta {
      font-family: var(--font-mono);
      font-size: 9.5px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .widget-body { padding: 10px 12px; overflow: auto; flex: 1; }
    .widget-body.flush { padding: 0; }

    /* Compact KPI row used inside widgets */
    .stat-row {
      display: flex; gap: 14px; flex-wrap: wrap;
    }
    .stat {
      display: flex; flex-direction: column; gap: 2px;
      min-width: 80px;
    }
    .stat .l {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; font-weight: 600;
    }
    .stat .v {
      font-family: var(--font-mono); font-size: 17px;
      font-weight: 700; color: var(--foreground);
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .stat .v.warn { color: var(--accent-yellow); }
    .stat .v.down { color: var(--accent-red); }
    .stat .v.up   { color: var(--accent-green); }
    .stat .s {
      font-family: var(--font-mono); font-size: 9.5px;
      color: var(--text-muted);
    }

    /* Dense ranking list inside a widget */
    .rank-row {
      display: grid; grid-template-columns: 16px 1fr auto;
      gap: 8px; padding: 4px 0;
      font-family: var(--font-mono); font-size: 11.5px;
      border-bottom: 1px solid var(--border);
      align-items: baseline;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row .idx { color: var(--text-dim); font-size: 10px; }
    .rank-row .name { color: var(--foreground); }
    .rank-row .name .sym {
      color: var(--text-muted); font-size: 10px;
      margin-left: 4px;
    }
    .rank-row .val { color: var(--foreground); font-weight: 600; font-variant-numeric: tabular-nums; }
    .rank-row.adi .name { color: var(--accent-red); font-weight: 700; }
    .rank-row.adi .val  { color: var(--accent-red); font-weight: 700; }
    .rank-row .val.warn { color: var(--accent-yellow); }
    .rank-row .val.down { color: var(--accent-red); }

    /* Command palette */
    .cmd-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 80px;
    }
    .cmd-box {
      width: 560px; max-width: 90vw;
      background: var(--card); border: 1px solid var(--border-bright);
      border-radius: 6px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .cmd-input {
      width: 100%; padding: 14px 18px;
      background: transparent; border: none; outline: none;
      color: var(--foreground); font-family: var(--font-mono);
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .cmd-input::placeholder { color: var(--text-muted); }
    .cmd-list { padding: 6px; max-height: 360px; overflow: auto; }
    .cmd-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; cursor: pointer; border-radius: 3px;
      font-family: var(--font-mono); font-size: 12px;
      color: var(--foreground);
    }
    .cmd-item:hover, .cmd-item.active {
      background: rgba(255,139,77,0.10);
      color: var(--accent-orange);
    }
    .cmd-item .kbd {
      font-size: 10px; color: var(--text-muted);
      padding: 1px 6px; border: 1px solid var(--border-bright);
      border-radius: 2px; letter-spacing: 0.06em;
    }

    .cmd-hint {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 3px;
      background: var(--panel-header);
      cursor: pointer;
    }
    .cmd-hint:hover { border-color: var(--accent-orange); color: var(--accent-orange); }
    .cmd-hint .kbd {
      background: var(--tint-medium);
      padding: 1px 5px; border-radius: 2px;
      margin-left: 6px; color: var(--foreground);
    }

    /* Sparkline */
    .spark { display: inline-block; vertical-align: middle; }

    /* Position read (Overview "where ADI sits" panel) */
    .position-read {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      padding: 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 4px;
      position: relative; overflow: hidden;
    }
    .position-read::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.3;
    }
    .position-read .pr-cell {
      padding: 4px 10px; border-left: 2px solid var(--border);
    }
    .position-read .pr-cell:first-child { border-left: none; padding-left: 4px; }
    .position-read .pr-label {
      font-size: 10px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; font-weight: 600; margin-bottom: 4px;
      font-family: var(--font-mono);
    }
    .position-read .pr-value {
      font-family: var(--font-sans); font-size: 13px; line-height: 1.5;
      color: var(--foreground);
    }
    .position-read .pr-value b { color: var(--accent-orange); }
    .position-read .pr-value .danger { color: var(--accent-red); }
    .position-read .pr-value .warn   { color: var(--accent-yellow); }

    /* Navigation cards on Overview (jumps to other pages) */
    .nav-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .nav-card {
      display: flex; flex-direction: column; gap: 6px;
      padding: 14px 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: border-color .15s ease, transform .15s ease;
      position: relative; overflow: hidden;
    }
    .nav-card:hover {
      border-color: var(--accent-orange); transform: translateY(-1px);
    }
    .nav-card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.35;
    }
    .nav-card .nc-eyebrow {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--accent-orange); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .nav-card .nc-title {
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      color: var(--foreground);
    }
    .nav-card .nc-sub {
      font-family: var(--font-sans); font-size: 11.5px;
      color: var(--text-muted); line-height: 1.5;
    }
    .nav-card .nc-arrow {
      font-family: var(--font-mono); font-size: 12px; color: var(--accent-orange);
      align-self: flex-end; margin-top: auto;
    }

    /* ────── Delta chip ───────────────────────────────────── */
    .delta {
      display: inline-block; padding: 1px 5px; margin-left: 4px;
      font-size: 9.5px; font-family: var(--font-mono);
      font-weight: 600; border-radius: 2px;
      font-variant-numeric: tabular-nums;
    }
    .delta.up   { color: var(--accent-green); background: rgba(46,204,113,0.12); }
    .delta.down { color: var(--accent-red);   background: rgba(255,90,95,0.12); }
    .delta.flat { color: var(--text-muted);   background: var(--tint-soft); }

    /* ────── Heatmap widget ──────────────────────────────── */
    .heatmap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 4px;
    }
    .heat-cell {
      padding: 8px 10px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 11px;
      display: flex; flex-direction: column; gap: 2px;
      cursor: pointer; position: relative;
      border: 1px solid transparent;
      transition: transform .12s ease, border-color .12s ease;
    }
    .heat-cell:hover { transform: translateY(-1px); border-color: var(--border-bright); }
    .heat-cell .hname { color: var(--foreground); font-weight: 600; font-size: 11.5px; }
    .heat-cell .hsym  { color: var(--text-muted); font-size: 9.5px; }
    .heat-cell .hval  { font-weight: 700; font-size: 13px; }
    .heat-cell.adi { outline: 1.5px solid var(--accent-orange); }

    /* ────── Detail pane (slides in from right) ──────────── */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
    }
    .detail-pane {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 460px; max-width: 95vw;
      background: var(--card);
      border-left: 1px solid var(--border-bright);
      z-index: 151;
      display: flex; flex-direction: column;
      animation: slidein .15s ease-out;
    }
    @keyframes slidein {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .detail-head {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
    }
    .detail-head h3 {
      margin: 0; font-family: var(--font-sans); font-size: 18px; font-weight: 700;
    }
    .detail-head .sub {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
      margin-top: 2px; letter-spacing: 0.04em;
    }
    .detail-close {
      background: transparent; border: 1px solid var(--border-bright);
      color: var(--text-muted); width: 28px; height: 28px; border-radius: 4px;
      cursor: pointer; font-size: 14px;
    }
    .detail-close:hover { color: var(--accent-orange); border-color: var(--accent-orange); }
    .detail-body { padding: 14px 16px; overflow: auto; flex: 1; }
    .detail-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 12px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .k {
      color: var(--text-muted); text-transform: uppercase;
      font-size: 10px; letter-spacing: 0.08em; font-weight: 600;
    }
    .detail-row .v { color: var(--foreground); font-weight: 600; }
    .detail-row .v.warn { color: var(--accent-yellow); }
    .detail-row .v.down { color: var(--accent-red); }
    .detail-row .v.up   { color: var(--accent-green); }
    .detail-section-label {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--accent-orange); text-transform: uppercase;
      letter-spacing: 0.14em; font-weight: 700;
      margin: 14px 0 6px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .detail-section-label:first-child { padding-top: 0; border-top: none; margin-top: 0; }

    /* Chart expanded overlay */
    .chart-expanded-bg {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
    }
    .chart-expanded {
      position: fixed; inset: 24px; z-index: 100;
      background: var(--card); border: 1px solid var(--border-bright);
      border-radius: 6px;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,17,21,0.25);
    }
    .live-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-orange);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    /* Main container */
    .main-wrap { flex: 1; }
    .main-inner {
      max-width: 1600px; margin: 0 auto;
      padding: 8px 6px 20px;
    }

    /* Status bar (footer) */
    .status-bar {
      height: 28px;
      border-top: 1px solid var(--border);
      background: var(--panel-header);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      font-size: 11px; color: var(--text-muted);
    }
    .status-bar .prompt { color: var(--accent-orange); margin-right: 6px; }

    /* ════════════════════════════════════════════════════════════════
       TUI panel, orange-accent header, gradient hairline on top
       ════════════════════════════════════════════════════════════════ */
    .tui-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .tui-panel::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.4;
    }
    .tui-panel-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 9px 16px;
      background: var(--panel-header);
      border-bottom: 1px solid var(--border);
      min-height: 36px;
    }
    .tui-panel-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent-orange);
    }
    .tui-panel-badge {
      font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .tui-panel-body { padding: 18px; }
    .tui-panel-body.pad-lg { padding: 22px 24px; }
    .tui-panel-body.flush { padding: 0; }

    /* Labeled divider */
    .tui-divider-labeled {
      display: flex; align-items: center; gap: 14px;
      margin: 28px 0 14px;
    }
    .tui-divider-labeled::before,
    .tui-divider-labeled::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }
    .tui-divider-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-muted); font-weight: 600;
    }

    /* Section spacing */
    .section { margin-bottom: 20px; }
    .section:last-child { margin-bottom: 0; }

    .page-header { margin-bottom: 18px; }
    .page-eyebrow {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--accent-orange); font-weight: 700; margin-bottom: 8px;
    }
    .page-title {
      font-family: var(--font-sans);
      font-size: 24px; font-weight: 700; letter-spacing: -0.01em;
      color: var(--foreground); margin: 0;
    }
    .page-sub {
      font-family: var(--font-sans);
      margin: 10px 0 0; max-width: 760px;
      font-size: 13.5px; color: var(--text-muted); line-height: 1.6;
    }

    /* ════════════════════════════════════════════════════════════════
       Counters / metric cards (TUI counter pattern)
       ════════════════════════════════════════════════════════════════ */
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }

    .counter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      position: relative;
      transition: border-color .15s ease, transform .15s ease;
    }
    .counter::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
      opacity: 0.3;
    }
    .counter:hover { border-color: var(--border-bright); }
    .counter-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); margin-bottom: 8px; font-weight: 600;
    }
    .counter-value {
      font-size: 22px; font-weight: 700; line-height: 1.1;
      font-variant-numeric: tabular-nums;
      color: var(--foreground);
    }
    .counter-value.danger { color: var(--accent-red); }
    .counter-sub {
      font-size: 11px; color: var(--text-muted); margin-top: 8px;
      letter-spacing: 0.02em;
    }

    /* ════════════════════════════════════════════════════════════════
       Data tables
       ════════════════════════════════════════════════════════════════ */
    .data-table {
      width: 100%; border-collapse: collapse;
      font-size: 11.5px; font-family: var(--font-mono);
    }
    .data-table thead th {
      text-align: left; font-size: 9.5px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted);
      padding: 7px 10px;
      border-bottom: 1px solid var(--border-bright);
      font-weight: 600; white-space: nowrap;
      background: var(--panel-header);
      position: sticky; top: 0; z-index: 1;
    }
    .data-table thead th.right { text-align: right; }
    .data-table tbody td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .data-table tbody td.right { text-align: right; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--tint-soft); }
    .data-table tbody tr.row-adi td { background: rgba(214,50,46,0.05); color: var(--accent-red); font-weight: 600; }
    .data-table tbody tr.row-adi:hover td { background: rgba(214,50,46,0.08); }
    .data-table tbody tr.row-section td {
      background: var(--panel-header);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text-muted); font-weight: 700;
      padding: 8px 14px;
    }
    .data-table tbody tr.row-section:hover td { background: var(--panel-header); }

    .danger { color: var(--accent-red); font-weight: 700; }
    .muted  { color: var(--text-muted); }

    /* ════════════════════════════════════════════════════════════════
       Tier chip
       ════════════════════════════════════════════════════════════════ */
    .chip {
      display: inline-flex; align-items: center;
      padding: 2px 8px; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
      border: 1px solid var(--border-bright); border-radius: 3px;
      color: var(--text-muted); background: var(--card);
    }
    .chip-large { color: var(--accent-green); border-color: rgba(15,157,88,0.4); background: rgba(15,157,88,0.06); }
    .chip-mid   { color: var(--accent-yellow); border-color: rgba(217,119,6,0.4); background: rgba(217,119,6,0.06); }
    .chip-small { color: var(--accent-blue); border-color: rgba(59,95,224,0.4); background: rgba(59,95,224,0.06); }
    .chip-adi   { color: var(--accent-red); border-color: rgba(214,50,46,0.4); background: rgba(214,50,46,0.06); }

    /* ════════════════════════════════════════════════════════════════
       Verdict callout (TUI styled)
       ════════════════════════════════════════════════════════════════ */
    .verdict {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-red);
      border-radius: 4px;
      padding: 18px 22px;
      font-size: 13px;
      line-height: 1.75;
      color: var(--foreground);
      position: relative;
      font-family: var(--font-sans);
      overflow: hidden;
    }
    .verdict::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
      opacity: 0.55;
    }
    .verdict-label {
      display: inline-block; font-family: var(--font-mono);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--accent-red); font-weight: 700; margin-right: 8px;
    }
    .verdict b { color: var(--accent-red); }
    .verdict em { font-style: normal; color: var(--accent-orange); font-weight: 600; }

    /* ─── Proof point callout ───────────────────────────────── */
    .proof {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-green);
      border-radius: 4px;
      padding: 18px 22px;
      font-family: var(--font-sans);
      font-size: 13.5px; line-height: 1.7;
      color: var(--foreground);
      position: relative;
      overflow: hidden;
    }
    .proof::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
      opacity: 0.55;
    }
    .proof-label {
      display: inline-block; font-family: var(--font-mono);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--accent-green); font-weight: 700; margin-right: 8px;
    }
    .proof blockquote {
      margin: 12px 0 6px 0; padding: 10px 14px;
      border-left: 2px solid var(--accent-green);
      font-style: italic; color: var(--foreground);
      background: rgba(15,157,88,0.04);
      font-size: 13px; line-height: 1.65;
    }
    .proof blockquote cite {
      display: block; margin-top: 6px; font-style: normal;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-muted); letter-spacing: 0.04em;
    }
    .proof b { color: var(--foreground); font-weight: 600; }
    .proof .partners {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .proof .partner {
      display: inline-flex; align-items: center;
      padding: 2px 10px; font-size: 10px;
      font-family: var(--font-mono); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: 1px solid var(--accent-green); border-radius: 3px;
      color: var(--accent-green); background: rgba(15,157,88,0.06);
    }

    /* ════════════════════════════════════════════════════════════════
       Meta strip (key-value pairs)
       ════════════════════════════════════════════════════════════════ */
    .meta-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 11px;
    }
    .meta-strip .kv {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 3px;
    }
    .meta-strip .kv .k {
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px;
    }
    .meta-strip .kv .v { color: var(--foreground); font-weight: 600; }

    /* ════════════════════════════════════════════════════════════════
       Reading guide list
       ════════════════════════════════════════════════════════════════ */
    .reading-list {
      list-style: none; padding: 0; margin: 0;
      display: grid; gap: 14px;
    }
    .reading-list li {
      display: grid; grid-template-columns: 24px 1fr; gap: 12px;
      font-family: var(--font-sans);
      font-size: 13.5px; line-height: 1.6; color: var(--text-muted);
    }
    .reading-list .lead {
      font-family: var(--font-mono);
      color: var(--accent-orange); font-weight: 700;
      text-align: right; padding-top: 1px;
      font-size: 11px; letter-spacing: 0.06em;
    }
    .reading-list b { color: var(--foreground); font-weight: 600; }

    /* Tier card grid */
    .tier-card { padding: 20px; }
    .tier-card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .tier-rows { display: grid; gap: 9px; }
    .tier-row {
      display: grid; grid-template-columns: 1fr auto; gap: 12px;
      align-items: baseline;
      font-size: 12px;
    }
    .tier-row .k { color: var(--text-muted); }
    .tier-row .v { color: var(--foreground); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Inline code-style for ADI ref */
    code.inline {
      font-family: var(--font-mono); font-size: 11.5px;
      background: var(--border); padding: 1px 6px; border-radius: 2px;
      color: var(--foreground);
    }

    /* ────────── Responsive ────────── */
    @media (max-width: 1024px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .grid-4 { grid-template-columns: 1fr; }
      .page-title { font-size: 20px; }
      .counter-value { font-size: 22px; }
      .nav-items { display: none; }
    }
  </style>
</head>
<body>
  <script>
    // Apply persisted theme BEFORE React mounts to avoid flash
    (function () {
      try {
        var t = localStorage.getItem('adi-l2-theme') || 'dark';
        document.body.setAttribute('data-theme', t);
      } catch(e) { document.body.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <div class="shell" id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>

  <script src="data.js"></script>

  <script type="text/babel" data-presets="env, react">
    const { useState } = React;
    const D = window.ADI_L2_DATA;

    /* ─── formatters ────────────────────────────────────── */
    const fmtUSD = (v, dp=1) => {
      if (v == null || v === '') return '-';
      const n = Number(v);
      if (Math.abs(n) >= 1e9) return `$${(n/1e9).toFixed(dp)}B`;
      if (Math.abs(n) >= 1e6) return `$${(n/1e6).toFixed(dp)}M`;
      if (Math.abs(n) >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
      return `$${n.toFixed(0)}`;
    };
    const fmtX   = (v, dp=2) => v == null ? '-' : `${Number(v).toFixed(dp)}×`;
    const fmtPct = (v, dp=2) => v == null ? '-' : `${Number(v).toFixed(dp)}%`;
    const fmtDelta = (v, dp=1) => {
      if (v == null) return <span className="muted">-</span>;
      const n = Number(v);
      const positive = n > 0;
      const big = Math.abs(n) > 50;
      const color = positive ? 'var(--accent-green)' : 'var(--accent-red)';
      return <span style={{ color, fontWeight: big ? 700 : 500 }}>{positive ? '+' : ''}{n.toFixed(dp)}%</span>;
    };

    /* ─── TUI primitives ────────────────────────────────── */
    const TuiPanel = ({ title, badge, flush=false, padLg=false, children }) => (
      <div className="tui-panel">
        <div className="tui-panel-header">
          <span className="tui-panel-title">{title}</span>
          {badge && <span className="tui-panel-badge">{badge}</span>}
        </div>
        <div className={`tui-panel-body${flush ? ' flush' : ''}${padLg ? ' pad-lg' : ''}`}>{children}</div>
      </div>
    );

    const Divider = ({ label }) => (
      <div className="tui-divider-labeled">
        {label && <span className="tui-divider-label">{label}</span>}
      </div>
    );

    const Counter = ({ label, value, sub, danger }) => (
      <div className="counter">
        <div className="counter-label">{label}</div>
        <div className={`counter-value${danger ? ' danger' : ''}`}>{value}</div>
        {sub && <div className="counter-sub">{sub}</div>}
      </div>
    );

    const TierChip = ({ tier }) => {
      const map = { Large: 'chip-large', Mid: 'chip-mid', Small: 'chip-small', Micro: 'chip-small', ADI: 'chip-adi' };
      return <span className={`chip ${map[tier] || ''}`}>{tier}</span>;
    };

    /* ─── Benchmark table ───────────────────────────────── */
    const BenchmarkTable = ({ rows, adi, openDetail }) => {
      const grouped = { Large: [], Mid: [], Small: [], Micro: [] };
      rows.forEach(r => (grouped[r.tier] || grouped.Micro).push(r));
      const handleClick = (r) => openDetail && openDetail(r);

      const distLabel = {
        airdrop:      'AIRDROP',
        no_token:     'NO TOKEN',
        token_swap:   'TOKEN SWAP',
        fair_launch:  'FAIR LAUNCH',
        private_only: 'PRIVATE',
      };
      const distColor = {
        airdrop:      'var(--accent-green)',
        no_token:     'var(--text-muted)',
        token_swap:   'var(--accent-blue)',
        fair_launch:  'var(--accent-cyan)',
        private_only: 'var(--accent-red)',
      };
      const DistChip = ({ kind }) => kind ? (
        <span style={{
          display: 'inline-block', padding: '1px 6px', fontSize: 9,
          fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: '0.08em',
          border: `1px solid ${distColor[kind]}`, borderRadius: 2,
          color: distColor[kind], background: 'transparent',
        }}>{distLabel[kind]}</span>
      ) : null;

      const renderRow = (r, isAdi=false) => {
        const tvl = isAdi ? r.tvl_with_ddsc : r.tvl;
        const mcap = isAdi ? r.token_mcap : (r.chain_mcap || r.token_mcap);
        const fdv = r.fdv_usd;
        const dex = r.dex_v24;
        const mcaptvl = isAdi ? r.mcaptvl_with_ddsc : ((mcap != null && tvl > 0) ? mcap/tvl : null);
        const fdvtvl  = (fdv != null && tvl > 0) ? fdv/tvl : null;
        const voltvl = (dex != null && tvl > 0) ? (dex/tvl*100) : null;
        return (
          <tr key={r.name + (isAdi ? '-adi' : '')}
              className={isAdi ? 'row-adi' : ''}
              onClick={() => handleClick(isAdi ? {...adi, name: 'ADI Chain', symbol: 'ADI'} : r)}
              style={{ cursor: 'pointer' }}>
            <td>{r.name}</td>
            <td className="muted">{r.symbol || '-'}</td>
            <td><DistChip kind={r.distribution_model} /></td>
            <td className="right">{fmtUSD(tvl)}</td>
            <td className="right">{fmtUSD(mcap)}</td>
            <td className="right">{fmtUSD(fdv)}</td>
            <td className="right">{mcaptvl == null ? '-' :
              <span className={mcaptvl > 50 ? 'danger' : ''}>{fmtX(mcaptvl)}</span>}</td>
            <td className="right">{fdvtvl == null ? '-' : <span className={fdvtvl > 100 ? 'danger' : ''}>{fmtX(fdvtvl)}</span>}</td>
            <td className="right">{r.tx_per_day == null ? '-' : Number(r.tx_per_day).toLocaleString(undefined,{maximumFractionDigits:0})}</td>
            <td className="right">{r.active_wallets_per_day == null ? '-' : Number(r.active_wallets_per_day).toLocaleString(undefined,{maximumFractionDigits:0})}</td>
            <td className="right">{fmtUSD(dex, 2)}</td>
            <td className="right">{voltvl == null ? '-' :
              <span className={voltvl === 0 ? 'danger' : ''}>{fmtPct(voltvl)}</span>}</td>
          </tr>
        );
      };

      return (
        <div style={{ maxHeight: 620, overflow: 'auto' }}>
          <table className="data-table">
            <thead>
              <tr>
                <th>Chain</th>
                <th>Token</th>
                <th>Distribution</th>
                <th className="right">TVL</th>
                <th className="right">Mcap</th>
                <th className="right">FDV</th>
                <th className="right">Mcap / TVL</th>
                <th className="right">FDV / TVL</th>
                <th className="right">Tx / day</th>
                <th className="right">Active wallets</th>
                <th className="right">24h DEX</th>
                <th className="right">Vol / TVL</th>
              </tr>
            </thead>
            <tbody>
              <tr className="row-section"><td colSpan="12">// ADI Chain · audit subject</td></tr>
              {renderRow(adi, true)}
              {['Large','Mid','Small','Micro'].map(tier => (
                <React.Fragment key={tier}>
                  <tr className="row-section"><td colSpan="12">// {tier} L2s · {grouped[tier].length} chains</td></tr>
                  {grouped[tier].map(r => renderRow(r))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    /* ─── Tier benchmark cards ──────────────────────────── */
    const TierBenchmarks = ({ summary }) => (
      <div className="grid-3">
        {['Large','Mid','Small'].map(t => {
          const s = summary[t];
          return (
            <div key={t} className="tui-panel">
              <div className="tui-panel-header">
                <span className="tui-panel-title">{t} L2 cohort</span>
                <span className="tui-panel-badge">N = {s.n}</span>
              </div>
              <div className="tui-panel-body">
                <div className="tier-card-head">
                  <TierChip tier={t} />
                  <span className="muted" style={{ fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Median values</span>
                </div>
                <div className="tier-rows">
                  <div className="tier-row"><span className="k">TVL</span><span className="v">{fmtUSD(s.tvl_med)}</span></div>
                  <div className="tier-row"><span className="k">Token Mcap</span><span className="v">{fmtUSD(s.mcap_med)}</span></div>
                  <div className="tier-row"><span className="k">24h DEX Volume</span><span className="v">{fmtUSD(s.dex_v24_med, 2)}</span></div>
                  <div className="tier-row"><span className="k">Mcap / TVL</span><span className="v">{fmtX(s.mcap_tvl_med)}</span></div>
                  <div className="tier-row"><span className="k">Vol / TVL</span><span className="v">{fmtPct(s.vol_tvl_pct_med)}</span></div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );

    /* ─── Mcap vs TVL scatter, wrapped in ChartWrapper ───── */
    const ScatterMcapVsTvl = ({ rows, adi, openDetail }) => {
      const [hover, setHover] = React.useState(null);
      const W = 960, H = 440, P = { l: 60, r: 28, t: 22, b: 40 };
      const inner = { w: W - P.l - P.r, h: H - P.t - P.b };

      // Build point set: every L2 with both Mcap and TVL > 0.
      // ADI now uses on-chain TVL (incl. DDSC) for consistency with the rest
      // of the dashboard. Audit-view ($2M Uniswap-only) is shown as a ghost
      // dot.
      const distColor = {
        airdrop:      'var(--accent-green)',
        no_token:     'var(--text-muted)',  // (won't appear, no Mcap)
        token_swap:   'var(--accent-blue)',
        fair_launch:  'var(--accent-cyan)',
        private_only: 'var(--accent-orange)',
      };

      const pts = rows.filter(r => r.tvl > 0 && (r.chain_mcap||0) > 0).map(r => ({
        row: r,
        name: r.name,
        sym: r.symbol,
        x: r.tvl,
        y: r.chain_mcap,
        mt: r.chain_mcap / r.tvl,
        dist: r.distribution_model,
        color: distColor[r.distribution_model] || 'var(--text-muted)',
      }));
      // ADI: on-chain truth point
      pts.push({
        row: { ...adi, name: 'ADI Chain', symbol: 'ADI' },
        name: 'ADI Chain', sym: 'ADI',
        x: adi.tvl_with_ddsc, y: adi.token_mcap,
        mt: adi.mcaptvl_with_ddsc,
        dist: 'private_only',
        color: 'var(--accent-red)',
        adi: true,
      });
      // ADI: DefiLlama-view ghost point ($2M Uniswap LP only)
      const adiGhost = {
        row: { ...adi, name: 'ADI Chain (DefiLlama view)', symbol: 'ADI' },
        name: 'ADI (DefiLlama view)', sym: '',
        x: adi.tvl_defillama_visible, y: adi.token_mcap,
        mt: adi.mcaptvl,
        dist: 'private_only',
        color: 'var(--accent-red)',
        ghost: true,
      };

      const xs = pts.map(p => Math.log10(p.x)).concat([Math.log10(adiGhost.x)]);
      const ys = pts.map(p => Math.log10(p.y));
      const xMin = Math.floor(Math.min(...xs));
      const xMax = Math.ceil(Math.max(...xs));
      const yMin = Math.floor(Math.min(...ys));
      const yMax = Math.ceil(Math.max(...ys));
      const sx = v => P.l + (Math.log10(v) - xMin) / (xMax - xMin) * inner.w;
      const sy = v => P.t + inner.h - (Math.log10(v) - yMin) / (yMax - yMin) * inner.h;

      // Size scale: radius proportional to log(Mcap), clamped 4-12
      const mcapLogs = pts.map(p => Math.log10(p.y));
      const mcMin = Math.min(...mcapLogs), mcMax = Math.max(...mcapLogs);
      const radius = (mcap, isAdi) => {
        if (isAdi) return 9;
        const t = (Math.log10(mcap) - mcMin) / (mcMax - mcMin || 1);
        return 4 + t * 7;
      };

      const xTicks = []; for (let i = xMin; i <= xMax; i++) xTicks.push(i);
      const yTicks = []; for (let i = yMin; i <= yMax; i++) yTicks.push(i);
      const tickFmt = t => t >= 9 ? `$${10**(t-9)}B` : t >= 6 ? `$${10**(t-6)}M` : `$${10**(t-3)}K`;

      // Build healthy band polygon (Mcap/TVL between 0.3x and 5x)
      const bandPts = [
        { x: 10**xMin, y: 10**xMin * 0.3 },
        { x: 10**xMax, y: 10**xMax * 0.3 },
        { x: 10**xMax, y: 10**xMax * 5 },
        { x: 10**xMin, y: 10**xMin * 5 },
      ];
      const bandPath = bandPts.map((p, i) => `${i===0?'M':'L'} ${sx(p.x).toFixed(1)} ${sy(Math.max(p.y, 10**yMin)).toFixed(1)}`).join(' ') + ' Z';

      // Always label these chains for orientation
      const ALWAYS_LABEL = new Set(['Base','Arbitrum','OP Mainnet','Mantle','World Chain','ZKsync Era','Linea','MegaETH','IOTA EVM','Manta','Sophon','Scroll','Blast','Movement']);

      const svg = (
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
             style={{ display: 'block', width: '100%', height: 'auto', cursor: hover ? 'pointer' : 'default' }}>
          {/* Healthy band */}
          <path d={bandPath} fill="rgba(46,204,113,0.07)" stroke="rgba(46,204,113,0.18)" strokeDasharray="2 4" />
          <text x={sx(10**(xMin + (xMax-xMin)*0.05))} y={sy(10**(xMin + (xMax-xMin)*0.05) * 5) - 4}
                fontSize="9" fill="var(--accent-green)" fontFamily="var(--font-mono)" fontStyle="italic" opacity="0.7">
            healthy band (Mcap/TVL 0.3-5×)
          </text>

          {/* Gridlines */}
          {yTicks.map(t => (
            <line key={`gy${t}`} x1={P.l} y1={sy(10**t)} x2={P.l + inner.w} y2={sy(10**t)}
                  stroke="var(--border)" strokeDasharray="3 3" />
          ))}
          {xTicks.map(t => (
            <line key={`gx${t}`} x1={sx(10**t)} y1={P.t} x2={sx(10**t)} y2={P.t + inner.h}
                  stroke="var(--tint-soft)" strokeDasharray="3 3" />
          ))}

          {/* Axis lines */}
          <line x1={P.l} y1={P.t} x2={P.l} y2={P.t + inner.h} stroke="var(--border-bright)" />
          <line x1={P.l} y1={P.t + inner.h} x2={P.l + inner.w} y2={P.t + inner.h} stroke="var(--border-bright)" />

          {/* Y tick labels */}
          {yTicks.map(t => (
            <text key={`yl${t}`} x={P.l - 8} y={sy(10**t) + 3} fontSize="10" textAnchor="end"
                  fill="var(--text-muted)" fontFamily="var(--font-mono)">{tickFmt(t)}</text>
          ))}
          {/* X tick labels */}
          {xTicks.map(t => (
            <text key={`xl${t}`} x={sx(10**t)} y={P.t + inner.h + 18} fontSize="10" textAnchor="middle"
                  fill="var(--text-muted)" fontFamily="var(--font-mono)">{tickFmt(t)}</text>
          ))}
          {/* Axis titles */}
          <text x={P.l + inner.w/2} y={H - 4} fontSize="10" textAnchor="middle"
                fill="var(--text-muted)" fontFamily="var(--font-mono)" letterSpacing="0.1em">TVL (LOG SCALE)</text>
          <text x={14} y={P.t + inner.h/2} fontSize="10" textAnchor="middle"
                fill="var(--text-muted)" fontFamily="var(--font-mono)" letterSpacing="0.1em"
                transform={`rotate(-90 14 ${P.t + inner.h/2})`}>MCAP (LOG SCALE)</text>

          {/* Mcap = TVL reference */}
          <line x1={sx(10**xMin)} y1={sy(10**xMin)} x2={sx(10**xMax)} y2={sy(10**xMax)}
                stroke="var(--tint-strong)" strokeDasharray="4 4" />
          <text x={sx(10**(xMin + (xMax-xMin)*0.88))} y={sy(10**(xMin + (xMax-xMin)*0.88)) - 6}
                fontSize="10" fill="var(--text-muted)" textAnchor="middle" fontStyle="italic"
                fontFamily="var(--font-mono)">Mcap = TVL</text>

          {/* ADI ghost point (DefiLlama view), drawn first so on-chain sits on top */}
          {(() => {
            const cx = sx(adiGhost.x), cy = sy(adiGhost.y);
            return (
              <g style={{ cursor: 'pointer' }}
                 onMouseEnter={(e) => setHover({ p: adiGhost, x: cx, y: cy })}
                 onMouseLeave={() => setHover(null)}
                 onClick={() => openDetail && openDetail(adiGhost.row)}>
                <circle cx={cx} cy={cy} r="7" fill="none" stroke="var(--accent-red)" strokeWidth="1.5" strokeDasharray="2 2" opacity="0.7" />
              </g>
            );
          })()}
          {/* Connecting line ADI ghost → ADI on-chain */}
          {(() => {
            const adiPt = pts.find(p => p.adi);
            if (!adiPt) return null;
            return <line x1={sx(adiGhost.x)} y1={sy(adiGhost.y)} x2={sx(adiPt.x)} y2={sy(adiPt.y)}
                          stroke="var(--accent-red)" strokeDasharray="2 2" opacity="0.5" />;
          })()}

          {/* Points */}
          {pts.map((p, i) => {
            const cx = sx(p.x), cy = sy(p.y);
            const r = radius(p.y, p.adi);
            const nearRight = cx > P.l + inner.w - 90;
            const showLabel = p.adi || ALWAYS_LABEL.has(p.name);
            return (
              <g key={`${p.name}-${i}`}
                 style={{ cursor: 'pointer' }}
                 onMouseEnter={() => setHover({ p, x: cx, y: cy })}
                 onMouseLeave={() => setHover(null)}
                 onClick={() => openDetail && openDetail(p.row)}>
                <circle cx={cx} cy={cy} r={r}
                        fill={p.color} fillOpacity={p.adi ? 1 : 0.72}
                        stroke={p.adi ? 'var(--accent-red)' : 'var(--card)'}
                        strokeWidth={p.adi ? 2 : 1} />
                {showLabel && (
                  <text x={nearRight ? cx - r - 4 : cx + r + 4} y={cy + 3} fontSize="10.5"
                        fill={p.adi ? 'var(--accent-red)' : 'var(--foreground)'}
                        fontWeight={p.adi ? 700 : 500}
                        fontFamily="var(--font-mono)"
                        textAnchor={nearRight ? 'end' : 'start'}>{p.name}</text>
                )}
              </g>
            );
          })}

          {/* Hover tooltip */}
          {hover && (() => {
            const { p, x, y } = hover;
            const labelLines = [
              p.name,
              `TVL ${fmtUSD(p.x)}  ·  Mcap ${fmtUSD(p.y)}`,
              `M/T ${fmtX(p.mt, 2)}  ·  ${p.dist || '-'}${p.ghost ? '  (DefiLlama-only view)' : ''}`,
            ];
            const tipW = 230, tipH = 52;
            const flipX = x > W - tipW - 10;
            const tx = flipX ? x - tipW - 10 : x + 10;
            const ty = Math.max(P.t + 4, y - tipH - 6);
            return (
              <g pointerEvents="none">
                <rect x={tx} y={ty} width={tipW} height={tipH} rx="3"
                      fill="var(--card)" stroke="var(--border-bright)" />
                {labelLines.map((line, k) => (
                  <text key={k} x={tx + 8} y={ty + 14 + k * 13}
                        fontSize={k === 0 ? 11.5 : 10}
                        fontWeight={k === 0 ? 700 : 500}
                        fill={k === 0 ? 'var(--accent-orange)' : 'var(--foreground)'}
                        fontFamily="var(--font-mono)">{line}</text>
                ))}
              </g>
            );
          })()}
        </svg>
      );

      const legend = (
        <div className="chart-footer">
          <span className="legend-item"><span className="legend-sw" style={{ background: 'var(--accent-green)' }} />Airdrop L2</span>
          <span className="legend-item"><span className="legend-sw" style={{ background: 'var(--accent-blue)' }} />Token swap</span>
          <span className="legend-item"><span className="legend-sw" style={{ background: 'var(--accent-cyan)' }} />Fair launch</span>
          <span className="legend-item"><span className="legend-sw" style={{ background: 'var(--accent-red)' }} />ADI (on-chain)</span>
          <span className="legend-item">
            <svg width="14" height="10"><circle cx="7" cy="5" r="4" fill="none" stroke="var(--accent-red)" strokeWidth="1.5" strokeDasharray="2 2" /></svg>
            ADI (DefiLlama view)
          </span>
          <span className="legend-item">
            <span className="legend-sw" style={{ background: 'rgba(46,204,113,0.18)', border: '1px dashed rgba(46,204,113,0.5)' }} />
            Healthy band 0.3-5×
          </span>
          <span className="legend-item" style={{ marginLeft: 'auto' }}>
            <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)' }}>dot size ∝ Mcap · click for detail</span>
          </span>
        </div>
      );

      return (
        <ChartWrapper screenshotName="adi-mcap-vs-tvl-scatter" legend={legend} note={null}>
          {svg}
        </ChartWrapper>
      );
    };

    /* ─── Icons for chart toolbar ──────────────────────── */
    const IconCamera = () => (
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
        <circle cx="12" cy="13" r="4" />
      </svg>
    );
    const IconExpand = () => (
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" />
        <line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" />
      </svg>
    );
    const IconCollapse = () => (
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="4 14 10 14 10 20" /><polyline points="20 10 14 10 14 4" />
        <line x1="14" y1="10" x2="21" y2="3" /><line x1="3" y1="21" x2="10" y2="14" />
      </svg>
    );

    /* ─── Reusable ChartWrapper, SDK pattern ──────────── */
    // Mirrors @datumlabs/dashboard-kit/src/components/ChartWrapper.tsx:
    //   - Toolbar (left: optional time pills, right: camera + expand icons)
    //   - Chart body with faint watermark behind content
    //   - Footer with legend chips
    //   - Optional "Read:" interpretation note
    //   - Expanded mode (fullscreen overlay)
    const ChartWrapper = ({
      timeRanges,        // [7,30,90] or null
      activeRange,
      onRangeChange,
      watermarkText = 'ADI · L2 BENCHMARK',
      screenshotName,
      legend,            // React node (legend chips)
      note,              // React node (read note)
      children,          // chart SVG
    }) => {
      const [expanded, setExpanded] = useState(false);
      const ref = React.useRef(null);

      const screenshot = async () => {
        if (!ref.current || !window.htmlToImage) return;
        try {
          const dataUrl = await window.htmlToImage.toPng(ref.current, {
            backgroundColor: getComputedStyle(document.body).backgroundColor,
            pixelRatio: 2, cacheBust: true,
          });
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `${screenshotName || 'chart'}-${D.asOf}.png`;
          a.click();
        } catch (e) { console.error('Chart screenshot failed:', e); }
      };

      const toolbar = (
        <div className="chart-toolbar">
          <div className="time-pills">
            {(timeRanges || []).map(r => (
              <button key={r} className={`time-pill ${activeRange === r ? 'active' : ''}`} onClick={() => onRangeChange?.(r)}>
                {r}D
              </button>
            ))}
          </div>
          <div className="chart-actions">
            <button className="chart-action-btn" onClick={screenshot} title="Download chart as PNG"><IconCamera /></button>
            <button className="chart-action-btn" onClick={() => setExpanded(v => !v)} title={expanded ? 'Collapse chart' : 'Expand chart'}>
              {expanded ? <IconCollapse /> : <IconExpand />}
            </button>
          </div>
        </div>
      );

      const body = (
        <div className="chart-canvas" ref={ref} style={{ padding: '18px 14px 6px', position: 'relative', flex: expanded ? 1 : 'unset' }}>
          {watermarkText && <div className="chart-watermark" style={{ fontSize: expanded ? 96 : 64 }}>{watermarkText}</div>}
          {children}
        </div>
      );

      if (expanded) {
        return (
          <>
            <div className="chart-expanded-bg" onClick={() => setExpanded(false)} />
            <div className="chart-expanded">
              {toolbar}
              {body}
              {legend}
              {note}
            </div>
          </>
        );
      }
      return (
        <>
          {toolbar}
          {body}
          {legend}
          {note}
        </>
      );
    };

    /* ─── Mcap/TVL trend chart, SDK ChartWrapper aesthetic ─ */
    const McapTvlTrend = ({ history, adi }) => {
      const TIME_RANGES = [7, 30, 90];
      const [range, setRange] = useState(90);

      // Slice the window
      const N_full = history.days.length;
      const N = Math.min(range, N_full);
      const sliceFrom = N_full - N;
      const days = history.days.slice(sliceFrom);
      const bands = {
        Large: history.tierBands.Large.slice(sliceFrom),
        Mid:   history.tierBands.Mid.slice(sliceFrom),
        Small: history.tierBands.Small.slice(sliceFrom),
      };
      const adiSeries = history.adi.slice(sliceFrom);

      // Collect Y range
      const allY = [];
      ['Large','Mid','Small'].forEach(t => bands[t].forEach(b => {
        if (b.p25 != null && b.p25 > 0) allY.push(b.p25);
        if (b.p75 != null) allY.push(b.p75);
      }));
      adiSeries.forEach(v => v != null && allY.push(v));
      const yLogMin = Math.floor(Math.log10(Math.max(0.05, Math.min(...allY))));
      const yLogMax = Math.ceil(Math.log10(Math.max(...allY)));

      // Geometry, chart area, with right gutter for endpoint labels
      const W = 980, H = 360;
      const P = { l: 56, r: 96, t: 18, b: 36 };
      const inner = { w: W - P.l - P.r, h: H - P.t - P.b };
      const sx = i => P.l + (N === 1 ? 0 : (i / (N - 1)) * inner.w);
      const sy = v => P.t + inner.h - (Math.log10(v) - yLogMin) / (yLogMax - yLogMin) * inner.h;

      const tierStyle = {
        Large: { col: 'var(--accent-green)',  rgb: '15,157,88',  label: 'Large L2' },
        Mid:   { col: 'var(--accent-yellow)', rgb: '217,119,6',  label: 'Mid L2'   },
        Small: { col: 'var(--accent-blue)',   rgb: '59,95,224',  label: 'Small L2' },
      };

      // Build smooth paths via simple polyline
      const lineFromPoints = pts => pts.map((p, i) => `${i===0?'M':'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' ');
      const buildLine = arr => {
        const pts = arr.map((b, i) => b.med != null ? { x: sx(i), y: sy(b.med) } : null).filter(Boolean);
        return lineFromPoints(pts);
      };
      const buildBand = arr => {
        const top = arr.map((b, i) => b.p75 != null ? { x: sx(i), y: sy(b.p75) } : null).filter(Boolean);
        const bot = arr.map((b, i) => b.p25 != null ? { x: sx(i), y: sy(b.p25) } : null).filter(Boolean).reverse();
        if (!top.length || !bot.length) return '';
        return [...top, ...bot].map((p, i) => `${i===0?'M':'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' ') + ' Z';
      };
      const adiPathPts = adiSeries.map((v, i) => v != null ? { x: sx(i), y: sy(v) } : null).filter(Boolean);
      const adiPath = lineFromPoints(adiPathPts);

      // Y ticks
      const yTicks = [];
      for (let i = yLogMin; i <= yLogMax; i++) yTicks.push(i);

      // X ticks, show 4-5 labels evenly spaced
      const nXTicks = Math.min(5, N);
      const xTickIdxs = Array.from({ length: nXTicks }, (_, k) => Math.round((k / (nXTicks-1)) * (N-1)));
      const dateFmt = ts => {
        const d = new Date(ts * 1000);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[d.getMonth()]} ${d.getDate()}`;
      };
      const yFmt = pow => {
        const v = 10**pow;
        if (v >= 100) return `${v.toFixed(0)}×`;
        if (v >= 10)  return `${v.toFixed(0)}×`;
        if (v >= 1)   return `${v.toFixed(1)}×`;
        return `${v.toFixed(2)}×`;
      };

      // Endpoint values for line labels
      const lastVal = arr => {
        for (let i = arr.length - 1; i >= 0; i--) if (arr[i] != null) return arr[i];
        return null;
      };
      const lastMed = {
        Large: lastVal(bands.Large.map(b => b?.med)),
        Mid:   lastVal(bands.Mid.map(b => b?.med)),
        Small: lastVal(bands.Small.map(b => b?.med)),
      };
      const lastAdi = lastVal(adiSeries);

      // Chart SVG
      const renderSvg = (height = H) => (
        <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block', width: '100%', height: 'auto' }}>
          <defs>
            {['Large','Mid','Small'].map(t => (
              <linearGradient key={`grad-${t}`} id={`grad-${t}-${range}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor={tierStyle[t].col} stopOpacity="0.28" />
                <stop offset="100%" stopColor={tierStyle[t].col} stopOpacity="0.02" />
              </linearGradient>
            ))}
          </defs>

          {/* Gridlines, recharts CartesianGrid 3,3 dashed */}
          {yTicks.map(t => (
            <line key={`gy${t}`} x1={P.l} y1={sy(10**t)} x2={P.l + inner.w} y2={sy(10**t)}
                  stroke="var(--border)" strokeDasharray="3 3" />
          ))}
          {xTickIdxs.map(i => (
            <line key={`gx${i}`} x1={sx(i)} y1={P.t} x2={sx(i)} y2={P.t + inner.h}
                  stroke="var(--tint-soft)" strokeDasharray="3 3" />
          ))}

          {/* Axis lines, left + bottom, thin */}
          <line x1={P.l} y1={P.t} x2={P.l} y2={P.t + inner.h} stroke="var(--border-bright)" />
          <line x1={P.l} y1={P.t + inner.h} x2={P.l + inner.w} y2={P.t + inner.h} stroke="var(--border-bright)" />

          {/* Y tick labels */}
          {yTicks.map(t => (
            <text key={`yl${t}`} x={P.l - 8} y={sy(10**t) + 3} fontSize="10" textAnchor="end"
                  fill="var(--text-muted)" fontFamily="var(--font-mono)">{yFmt(t)}</text>
          ))}
          {/* X tick labels */}
          {xTickIdxs.map(i => (
            <text key={`xl${i}`} x={sx(i)} y={P.t + inner.h + 18} fontSize="10" textAnchor="middle"
                  fill="var(--text-muted)" fontFamily="var(--font-mono)">{dateFmt(days[i])}</text>
          ))}

          {/* Bands first (back), then lines (front) */}
          {['Small','Mid','Large'].map(t => {
            const d = buildBand(bands[t]);
            return d ? <path key={`band-${t}`} d={d} fill={`url(#grad-${t}-${range})`} stroke="none" /> : null;
          })}
          {['Small','Mid','Large'].map(t => (
            <path key={`med-${t}`} d={buildLine(bands[t])} stroke={tierStyle[t].col} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          ))}

          {/* Endpoint labels for tier medians (right of chart) */}
          {['Large','Mid','Small'].map(t => {
            if (lastMed[t] == null) return null;
            const cy = sy(lastMed[t]);
            return (
              <g key={`endlbl-${t}`}>
                <line x1={P.l + inner.w} y1={cy} x2={P.l + inner.w + 6} y2={cy} stroke={tierStyle[t].col} strokeWidth="1.5" />
                <text x={P.l + inner.w + 10} y={cy + 3} fontSize="10.5" fill={tierStyle[t].col}
                      fontFamily="var(--font-mono)" fontWeight="600">
                  {tierStyle[t].label}
                </text>
                <text x={P.l + inner.w + 10} y={cy + 16} fontSize="10" fill="var(--text-muted)" fontFamily="var(--font-mono)">
                  {fmtX(lastMed[t])}
                </text>
              </g>
            );
          })}

          {/* ADI line, bold red, drawn last (top of stack) */}
          <path d={adiPath} stroke="var(--accent-red)" strokeWidth="2.4" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          {adiPathPts.length > 0 && (
            <g>
              <circle cx={adiPathPts[adiPathPts.length-1].x} cy={adiPathPts[adiPathPts.length-1].y} r="4.5"
                      fill="var(--accent-red)" stroke="var(--card)" strokeWidth="2" />
              <line x1={P.l + inner.w} y1={adiPathPts[adiPathPts.length-1].y} x2={P.l + inner.w + 6} y2={adiPathPts[adiPathPts.length-1].y} stroke="var(--accent-red)" strokeWidth="1.5" />
              <text x={P.l + inner.w + 10} y={adiPathPts[adiPathPts.length-1].y + 3} fontSize="10.5"
                    fill="var(--accent-red)" fontFamily="var(--font-mono)" fontWeight="700">ADI</text>
              <text x={P.l + inner.w + 10} y={adiPathPts[adiPathPts.length-1].y + 16} fontSize="10"
                    fill="var(--accent-red)" fontFamily="var(--font-mono)" fontWeight="600">{fmtX(lastAdi, 0)}</text>
            </g>
          )}
        </svg>
      );

      const legend = (
        <div className="chart-footer">
          {['Large','Mid','Small'].map(t => (
            <span key={t} className="legend-item">
              <span className="legend-sw" style={{ background: tierStyle[t].col }} />
              {tierStyle[t].label} median
            </span>
          ))}
          <span className="legend-item">
            <span className="legend-sw" style={{ background: 'var(--accent-red)' }} />
            ADI Chain
          </span>
          <span className="legend-item" style={{ marginLeft: 'auto' }}>
            <span className="legend-band" style={{ background: 'rgba(15,157,88,0.16)' }} />
            Shaded = P25–P75 cohort spread
          </span>
        </div>
      );

      const adiOnChain = (D.adi && D.adi.mcaptvl_with_ddsc) ? D.adi.mcaptvl_with_ddsc : null;
      const note = null;

      return (
        <ChartWrapper
          timeRanges={TIME_RANGES} activeRange={range} onRangeChange={setRange}
          screenshotName={`adi-mcap-tvl-trend-${range}d`}
          legend={legend} note={note}
        >
          {renderSvg(H)}
        </ChartWrapper>
      );
    };

    /* ─── App shell ─────────────────────────────────────── */
    const NAV = [
      { id: 'overview', label: 'Overview',    hotkey: '1' },
      { id: 'scatter',  label: 'Charts',      hotkey: '2' },
      { id: 'table',    label: 'L2 Universe', hotkey: '3' },
