<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADI Chain · L2 Benchmark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before React mounts to avoid flash
      (function () {
        try {
          var t = localStorage.getItem('adi-l2-theme') || 'dark';
          document.body && document.body.setAttribute('data-theme', t);
          document.addEventListener('DOMContentLoaded', function () {
            document.body.setAttribute('data-theme', t);
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-theme="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
