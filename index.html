    /* ─── Command palette ────────────────────────────────── */
    const COMMANDS = [
      { id: 'go-overview', label: 'Go: Overview',          shortcut: '1', action: (set) => set('overview') },
      { id: 'go-scatter',  label: 'Go: Charts',            shortcut: '2', action: (set) => set('scatter') },
      { id: 'go-table',    label: 'Go: L2 Universe table', shortcut: '3', action: (set) => set('table') },
      { id: 'go-report',   label: 'Go: Report',            shortcut: '4', action: (set) => set('report') },
      { id: 'filter-airdrop',     label: 'Filter: Airdrop L2s only',     shortcut: 'F1', action: (_set, ctx) => ctx?.setFilter?.('airdrop') },
      { id: 'filter-non-airdrop', label: 'Filter: Non-airdrop L2s only', shortcut: 'F2', action: (_set, ctx) => ctx?.setFilter?.('non-airdrop') },
      { id: 'filter-no-token',    label: 'Filter: No-token L2s only',    shortcut: 'F3', action: (_set, ctx) => ctx?.setFilter?.('no_token') },
      { id: 'filter-all',         label: 'Filter: Show all L2s',         shortcut: 'F4', action: (_set, ctx) => ctx?.setFilter?.('all') },
      { id: 'theme',       label: 'Toggle dark / light mode', shortcut: 'T', action: (_set, ctx) => ctx?.toggleTheme?.() },
      { id: 'refresh',     label: 'Refresh data',          shortcut: 'R', action: () => window.location.reload() },
      { id: 'github',      label: 'Open GitHub repo',      shortcut: '↗', action: () => window.open('https://github.com/surgencelab/adil2benchmark','_blank') },
      { id: 'rpc',         label: 'Open ADI RPC explorer', shortcut: '↗', action: () => window.open('https://explorer.adifoundation.ai','_blank') },
    ];

    function CommandPalette({ open, onClose, setActive, ctx }) {
      const [q, setQ] = useState('');
      const [idx, setIdx] = useState(0);
      const inputRef = React.useRef(null);
      React.useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 50); }, [open]);
      if (!open) return null;
      const filtered = COMMANDS.filter(c => c.label.toLowerCase().includes(q.toLowerCase()));
      const onKey = (e) => {
        if (e.key === 'Escape') return onClose();
        if (e.key === 'ArrowDown') { e.preventDefault(); setIdx(i => Math.min(i+1, filtered.length-1)); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); setIdx(i => Math.max(i-1, 0)); }
        if (e.key === 'Enter') {
          e.preventDefault();
          const cmd = filtered[idx];
          if (cmd) { cmd.action(setActive, ctx); onClose(); }
        }
      };
      return (
        <div className="cmd-overlay" onClick={onClose}>
          <div className="cmd-box" onClick={e => e.stopPropagation()}>
            <input ref={inputRef} className="cmd-input"
                   placeholder="Type a command or search..."
                   value={q} onChange={e => { setQ(e.target.value); setIdx(0); }}
                   onKeyDown={onKey} />
            <div className="cmd-list">
              {filtered.map((c, i) => (
                <div key={c.id} className={`cmd-item ${i === idx ? 'active' : ''}`}
                     onMouseEnter={() => setIdx(i)}
                     onClick={() => { c.action(setActive, ctx); onClose(); }}>
                  <span>{c.label}</span>
                  <span className="kbd">{c.shortcut}</span>
                </div>
              ))}
              {filtered.length === 0 && (
                <div className="cmd-item" style={{ color: 'var(--text-muted)' }}>No commands match</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ─── Sidebar nav icons ────────────────────────────── */
    const NavIcon = ({ id }) => {
      const ic = {
        overview:     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
        distribution: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>,
        scatter:      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="6" cy="18" r="1.5"/><circle cx="10" cy="13" r="1.5"/><circle cx="14" cy="15" r="1.5"/><circle cx="18" cy="7" r="1.5"/><line x1="3" y1="3" x2="3" y2="21"/><line x1="3" y1="21" x2="21" y2="21"/></svg>,
        table:        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,

    /* ─── Sparkline (inline SVG) ───────────────────────── */
    const Spark = ({ data, width=60, height=18 }) => {
      if (!data || data.length < 2) return <span className="muted" style={{ fontSize: 10 }}>-</span>;
      const min = Math.min(...data), max = Math.max(...data);
      const range = max - min || 1;
      const pts = data.map((v, i) => {
        const x = (i / (data.length - 1)) * width;
        const y = height - ((v - min) / range) * (height - 2) - 1;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const trend = data[data.length-1] - data[0];
      const color = trend > 0 ? 'var(--accent-green)' : trend < 0 ? 'var(--accent-red)' : 'var(--text-muted)';
      return (
        <svg width={width} height={height} className="spark" style={{ display: 'inline-block' }}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    };

    /* ─── Delta chip ───────────────────────────────────── */
    const Delta = ({ pct, suffix = '%' }) => {
      if (pct == null || isNaN(pct)) return null;
      const cls = pct > 0.3 ? 'up' : pct < -0.3 ? 'down' : 'flat';
      const sign = pct > 0 ? '+' : '';
      return <span className={`delta ${cls}`}>{sign}{pct.toFixed(1)}{suffix}</span>;
    };

    /* ─── ChainChart: interactive multi-metric chart for detail pane ─ */
    function ChainChart({ chain }) {
      const r = chain;
      // Build available metrics
      const metrics = [
        { id: 'price',   label: 'Price',   data: r.sparkline_30d,    fmt: v => `$${v < 1 ? v.toFixed(4) : v.toFixed(2)}` },
        { id: 'tx',      label: 'Tx / day',data: r.tx_history,       fmt: v => Math.round(v).toLocaleString() },
        { id: 'daa',     label: 'Active wallets', data: r.daa_history, fmt: v => Math.round(v).toLocaleString() },
        { id: 'stables', label: 'Stables on chain', data: r.stables_history, fmt: v => fmtUSD(v) },
        { id: 'fees',    label: 'Fees paid (USD)', data: r.fees_history, fmt: v => fmtUSD(v, 2) },
      ];
      const available = metrics.filter(m => Array.isArray(m.data) && m.data.length > 1);
      const [activeId, setActiveId] = useState(available[0]?.id);
      const [hover, setHover] = useState(null);
      if (available.length === 0) {
        return <div style={{ padding: 12, fontSize: 11.5, color: 'var(--text-muted)' }}>
          No time-series available for this chain.
          {r.name === 'ADI Chain' && <div style={{ marginTop: 4 }}>ADI Chain not yet on Growthepie · submit at growthepie.xyz</div>}
        </div>;
      }
      const m = available.find(x => x.id === activeId) || available[0];
      const data = m.data;
      const W = 420, H = 140, P = { l: 50, r: 8, t: 10, b: 22 };
      const inner = { w: W - P.l - P.r, h: H - P.t - P.b };
      const min = Math.min(...data), max = Math.max(...data);
      const range = max - min || 1;
      const sx = i => P.l + (i / (data.length - 1)) * inner.w;
      const sy = v => P.t + inner.h - ((v - min) / range) * (inner.h - 2) - 1;
      const trend = data[data.length-1] - data[0];
      const trendPct = data[0] ? (trend / data[0]) * 100 : 0;
      const stroke = trend >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
      const fill   = trend >= 0 ? 'rgba(46,204,113,0.14)' : 'rgba(255,90,95,0.14)';
      const pts = data.map((v, i) => `${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
      const areaPts = `${sx(0).toFixed(1)},${(P.t+inner.h).toFixed(1)} ${pts} ${sx(data.length-1).toFixed(1)},${(P.t+inner.h).toFixed(1)}`;
      const ts = r.history_timestamps;
      const tsAt = i => ts && ts[i] ? new Date(ts[i]*1000).toLocaleDateString(undefined,{month:'short', day:'numeric'}) : `d-${data.length-1-i}`;
      const ticks = [0, Math.floor(data.length*0.5), data.length-1];

      const onMove = (e) => {
        const svg = e.currentTarget;
        const rect = svg.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * W;
        if (x < P.l || x > P.l + inner.w) return setHover(null);
        const i = Math.round(((x - P.l) / inner.w) * (data.length - 1));
        setHover({ i, v: data[i] });
      };

      return (
        <div>
          {/* metric tabs */}
          <div style={{ display: 'flex', gap: 4, marginBottom: 6, flexWrap: 'wrap' }}>
            {available.map(opt => (
              <button key={opt.id} onClick={() => setActiveId(opt.id)}
                      className={`time-pill ${activeId === opt.id ? 'active' : ''}`}
                      style={{ padding: '3px 8px', fontSize: 9.5 }}>
                {opt.label}
              </button>
            ))}
          </div>

          <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
               style={{ display: 'block', width: '100%', height: 'auto', cursor: 'crosshair' }}
               onMouseMove={onMove} onMouseLeave={() => setHover(null)}>
            <defs>
              <linearGradient id={`g-${r.name}-${m.id}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor={stroke} stopOpacity="0.30" />
                <stop offset="100%" stopColor={stroke} stopOpacity="0.02" />
              </linearGradient>
            </defs>
            {/* y gridlines */}
            {[0, 0.5, 1].map(p => {
              const y = P.t + p * inner.h;
              return <line key={p} x1={P.l} y1={y} x2={P.l+inner.w} y2={y} stroke="var(--tint-soft)" />;
            })}
            {/* y tick labels */}
            <text x={P.l - 6} y={P.t + 4} textAnchor="end" fontSize="9" fill="var(--text-muted)" fontFamily="var(--font-mono)">{m.fmt(max)}</text>
            <text x={P.l - 6} y={P.t + inner.h + 3} textAnchor="end" fontSize="9" fill="var(--text-muted)" fontFamily="var(--font-mono)">{m.fmt(min)}</text>
            {/* x tick labels */}
            {ticks.map(i => (
              <text key={i} x={sx(i)} y={H - 8} textAnchor="middle" fontSize="9" fill="var(--text-muted)" fontFamily="var(--font-mono)">{tsAt(i)}</text>
            ))}
            {/* area */}
            <polygon points={areaPts} fill={`url(#g-${r.name}-${m.id})`} stroke="none" />
            {/* line */}
            <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
            {/* hover crosshair */}
            {hover && (
              <g>
                <line x1={sx(hover.i)} y1={P.t} x2={sx(hover.i)} y2={P.t+inner.h} stroke="var(--text-muted)" strokeDasharray="2 2" />
                <circle cx={sx(hover.i)} cy={sy(hover.v)} r="3" fill={stroke} stroke="var(--card)" strokeWidth="1.5" />
                <rect x={sx(hover.i) + 6} y={sy(hover.v) - 18} width="100" height="32" rx="2" fill="var(--card)" stroke="var(--border-bright)" />
                <text x={sx(hover.i) + 12} y={sy(hover.v) - 5} fontSize="10" fill="var(--text-muted)" fontFamily="var(--font-mono)">{tsAt(hover.i)}</text>
                <text x={sx(hover.i) + 12} y={sy(hover.v) + 8} fontSize="11" fill="var(--foreground)" fontFamily="var(--font-mono)" fontWeight="700">{m.fmt(hover.v)}</text>
              </g>
            )}
          </svg>

          {/* footer summary */}
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 10.5, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>
            <span>{data.length}d window</span>
            <span>
              Current <span style={{ color: 'var(--foreground)', fontWeight: 600 }}>{m.fmt(data[data.length-1])}</span>
              {' · '}
              <span style={{ color: stroke, fontWeight: 600 }}>{trendPct >= 0 ? '+' : ''}{trendPct.toFixed(1)}%</span>
            </span>
          </div>
        </div>
      );
    }

    /* ─── Detail pane (slides in from right) ───────────── */

        <>
          <div className="detail-overlay" onClick={onClose} />
          <div className="detail-pane">
            <div className="detail-head">

                <h3>{r.name}{isAdi && <span style={{ color: 'var(--accent-red)', marginLeft: 8, fontSize: 11 }}>AUDIT SUBJECT</span>}</h3>
                <div className="sub">{r.symbol || 'no token'} · {r.distribution_model || '-'} · {r.tier || 'tier-tbd'}</div>

              <button className="detail-close" onClick={onClose}>×</button>
            </div>
            <div className="detail-body">
              <div className="detail-section-label">Core metrics</div>
              <div className="detail-row"><span className="k">TVL</span><span className="v">{fmtUSD(isAdi ? r.tvl_with_ddsc : r.tvl)}</span></div>
              <div className="detail-row"><span className="k">Token Mcap</span><span className="v">{fmtUSD(r.chain_mcap || r.token_mcap)}</span></div>
              <div className="detail-row"><span className="k">FDV</span><span className="v">{fmtUSD(r.fdv_usd)}</span></div>
              <div className="detail-row"><span className="k">Max supply</span><span className="v">{r.max_supply ? Number(r.max_supply).toLocaleString(undefined,{maximumFractionDigits:0}) : '-'}</span></div>
              <div className="detail-row"><span className="k">Circulating</span><span className="v">{r.circulating_supply ? Number(r.circulating_supply).toLocaleString(undefined,{maximumFractionDigits:0}) : '-'}</span></div>
              <div className="detail-row"><span className="k">Mcap / TVL</span><span className={`v ${(isAdi ? r.mcaptvl_with_ddsc : mt) > 50 ? 'down' : (isAdi ? r.mcaptvl_with_ddsc : mt) > 10 ? 'warn' : ''}`}>{fmtX(isAdi ? r.mcaptvl_with_ddsc : mt, 2)}</span></div>
              <div className="detail-row"><span className="k">FDV / TVL</span><span className={`v ${fdvtvl > 50 ? 'down' : fdvtvl > 10 ? 'warn' : ''}`}>{fmtX(isAdi ? (r.fdv_usd && r.tvl_with_ddsc ? r.fdv_usd / r.tvl_with_ddsc : null) : fdvtvl, 2)}</span></div>

              <div className="detail-section-label">Activity</div>
              <div className="detail-row"><span className="k">Tx / day</span><span className="v">{r.tx_per_day ? Math.round(r.tx_per_day).toLocaleString() : '-'}</span></div>
              <div className="detail-row"><span className="k">Active wallets / day</span><span className="v">{r.active_wallets_per_day ? Math.round(r.active_wallets_per_day).toLocaleString() : '-'}</span></div>
              <div className="detail-row"><span className="k">24h DEX volume</span><span className="v">{fmtUSD(r.dex_v24, 2)}</span></div>
              <div className="detail-row"><span className="k">24h total volume</span><span className="v">{fmtUSD(r.total_volume_usd, 2)}</span></div>
              <div className="detail-row"><span className="k">Stables on chain</span><span className="v">{fmtUSD(r.stables_mcap_chain)}</span></div>
              <div className="detail-row"><span className="k">Protocols</span><span className="v">{r.protocols ?? '-'}</span></div>

              <div className="detail-section-label">Momentum</div>
              <div className="detail-row"><span className="k">TVL 7d</span><span className={`v ${r.tvl_chg_7d > 0 ? 'up' : r.tvl_chg_7d < 0 ? 'down' : ''}`}>{r.tvl_chg_7d != null ? `${r.tvl_chg_7d > 0 ? '+':''}${r.tvl_chg_7d.toFixed(2)}%` : '-'}</span></div>
              <div className="detail-row"><span className="k">TVL 30d</span><span className={`v ${r.tvl_chg_30d > 0 ? 'up' : r.tvl_chg_30d < 0 ? 'down' : ''}`}>{r.tvl_chg_30d != null ? `${r.tvl_chg_30d > 0 ? '+':''}${r.tvl_chg_30d.toFixed(2)}%` : '-'}</span></div>
              <div className="detail-row"><span className="k">Price 7d</span><span className={`v ${r.price_chg_7d > 0 ? 'up' : r.price_chg_7d < 0 ? 'down' : ''}`}>{r.price_chg_7d != null ? `${r.price_chg_7d > 0 ? '+':''}${r.price_chg_7d.toFixed(2)}%` : '-'}</span></div>
              <div className="detail-row"><span className="k">Price 30d</span><span className={`v ${r.price_chg_30d > 0 ? 'up' : r.price_chg_30d < 0 ? 'down' : ''}`}>{r.price_chg_30d != null ? `${r.price_chg_30d > 0 ? '+':''}${r.price_chg_30d.toFixed(2)}%` : '-'}</span></div>

              <div className="detail-section-label">30d chart</div>

              <div className="detail-section-label">Distribution</div>

              <div className="detail-row"><span className="k">Has token</span><span className="v">{r.has_token === false ? 'no' : 'yes'}</span></div>

              {isAdi && (
                <>
                  <div className="detail-section-label">ADI-specific</div>
                  <div className="detail-row"><span className="k">DDSC supply (AED)</span><span className="v">{Number(r.ddsc_tvl_aed).toLocaleString()} AED</span></div>
                  <div className="detail-row"><span className="k">DDSC supply (USD)</span><span className="v">{fmtUSD(r.ddsc_tvl_usd)}</span></div>

                  <div className="detail-row"><span className="k">Gini</span><span className="v down">{r.gini}</span></div>
                </>

            </div>
          </div>
        </>

    function App() {

      const [detail, setDetail] = useState(null);
      const [tableFilter, setTableFilter] = useState('all');
      const [theme, setTheme] = useState(() => {
        try { return document.body.getAttribute('data-theme') || 'dark'; } catch (e) { return 'dark'; }
      });
      const adi = D.adi;
      const sum = D.tierSummary;
      const C = D.cohorts || {};
      // Click-to-detail helper passed into widgets
      const openDetail = (r) => setDetail(r);
      // Theme toggle
      const toggleTheme = () => {
        const next = theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        try { localStorage.setItem('adi-l2-theme', next); } catch (e) {}
        setTheme(next);
      };
      // Command-palette context for filter shortcuts + theme
      const cmdCtx = {
        setFilter: (id) => { setTableFilter(id); setActive('table'); },
        toggleTheme,
      };

      // Global keyboard shortcuts
      React.useEffect(() => {
        const onKey = (e) => {
          const tag = e.target.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
            e.preventDefault(); setCmdOpen(true); return;
          }
          if (e.key === '/') { e.preventDefault(); setCmdOpen(true); return; }
          if (e.key.toLowerCase() === 't') { e.preventDefault(); toggleTheme(); return; }
          if (/^[1-5]$/.test(e.key)) {
            const nav = NAV.find(n => n.hotkey === e.key);
            if (nav) setActive(nav.id);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [theme]);

      const exportPNG = async () => {
        if (exporting) return;
        setExporting(true);
        const target = document.querySelector('.main-inner');
        try {
          if (window.htmlToImage && target) {
            const dataUrl = await window.htmlToImage.toPng(target, {
              backgroundColor: getComputedStyle(document.body).backgroundColor || '#F5F6F8',
              pixelRatio: 2,
              cacheBust: true,
            });
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `adi-l2-benchmark-${active}-${D.asOf}.png`;
            a.click();
          } else {
            alert('PNG library not loaded, refresh and try again.');
          }
        } catch (e) {
          console.error('PNG export failed:', e);
          alert('Export failed: ' + e.message);
        } finally {
          setExporting(false);
        }
      };

      return (
        <>
          {/* Left sidebar nav */}
          <aside className="sidebar-nav">
            <div className="sidebar-brand" title="ADI L2 Benchmark">DL</div>
            {NAV.map(n => (
              <div key={n.id}
                   className={`sidebar-item ${active === n.id ? 'active' : ''}`}
                   onClick={() => setActive(n.id)}>
                <NavIcon id={n.id} />
                <span className="kbd-mini">{n.hotkey}</span>
                <span className="tip">{n.label}</span>
              </div>
            ))}
            <div className="sidebar-spacer" />
            <div className="sidebar-item" onClick={toggleTheme} title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}>
              {theme === 'dark' ? (
                /* sun icon for "switch to light" */
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <circle cx="12" cy="12" r="4"/>
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
              ) : (
                /* moon icon for "switch to dark" */
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              )}
              <span className="tip">{theme === 'dark' ? 'Light mode' : 'Dark mode'}</span>
            </div>
            <div className="sidebar-item" onClick={() => setCmdOpen(true)} title="Command palette (⌘K)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6h-6z"/></svg>
              <span className="tip">⌘K · Command</span>
            </div>
            <div className="sidebar-item" onClick={exportPNG} title="Export PNG">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

              <span className="tip">GitHub repo</span>

          {/* Ticker bar */}

            <div className="main-inner">

              {active === 'overview' && (() => {

                          <tbody>
                            <tr><td>Uniswap V3 LP</td><td className="right">{fmtUSD(adi.tvl_defillama_visible)}</td><td className="muted">DefiLlama</td></tr>

                            <tr style={{ background: 'rgba(255,139,77,0.08)', fontWeight: 600 }}>

                            <tr><td className="muted">DefiLlama view (no DDSC)</td><td className="right" style={{ color: 'var(--accent-red)' }}>{fmtUSD(adi.tvl_defillama_visible)}</td><td className="muted">audit ref</td></tr>
                          </tbody>

                        <span className="widget-meta">peer + tier + audit lens</span>
                      </div>
                      <div className="widget-body">
                        <div className="position-read">

                            <div className="pr-label">Peer cohort</div>
                            <div className="pr-value">
                              <b>Non-airdrop L2s</b> (private distribution).
                              Median M/T <b>{fmtX(C.NonAirdrop?.mcap_tvl_med,2)}</b>.
                              ADI's {fmtX(adiMT,2)} is <span className="warn">{(adiMT/(C.NonAirdrop?.mcap_tvl_med||1)).toFixed(1)}× the cohort median</span>.

                        <li><span className="num">A</span><span><b>Get DDSC indexed by DefiLlama.</b> Submit an adapter for DDSC's <code className="inline">{adi.ddsc_contract.slice(0,10)}…</code> contract on ADI Chain. Reference implementation: a 50-line TypeScript file in <code className="inline">defillama-adapters</code>. Once merged, the public Mcap/TVL number drops from 206× to {fmtX(adi.mcaptvl_with_ddsc, 2)} for everyone, automatically, with no slide deck required.</span></li>
                        <li><span className="num">B</span><span><b>Get DefiLlama's DEX adapter live for ADI Chain.</b> Same adapter pattern, different contracts. This closes the $0-volume display problem on the chain page. If real swap activity is below Mid-L2 standard, the adapter will show that honestly, and at that point we know the volume gap is real and needs a usage answer.</span></li>
                        <li><span className="num">C</span><span><b>Publish the lockup &amp; vesting schedule alongside DDSC growth.</b> The on-chain 99.28% concentration is real (Concern #1). The right pairing is: <em>"the float is tight by design, here's the unlock schedule, here's the $122M of real economic activity on the chain."</em> Tight float plus live usage is a defensible posture. Tight float without visible usage is not.</span></li>
                      </ol>

                      <h3 className="report-h2"><span className="num">05</span>What the data layer cannot fix</h3>
                      <p className="report-p">
                        Two facts remain regardless of how well the indexers catch up:
                      </p>
                      <p className="report-p">
                        <b>Float concentration is structural.</b> 99.28% in the top 10 wallets is a public fact. Even with DDSC reflected and DEX volume indexed, the cap-table reality stays until either an airdrop, a buyback, or a deliberate distribution event changes it. Disclosure makes that fact land better, but it doesn't change it.
                      </p>
                      <p className="report-p">
                        <b>Turnover takes float to grow.</b> Daily volume can rise with more venue listings and tighter spreads, but sustained turnover above 1% requires more tokens in market hands. That's a Lever-1 question (distribution) more than a Lever-2 question (TVL).
                      </p>

                      <div className="report-callout">
                        <strong>Bottom line:</strong> ADI's on-chain Mcap/TVL is <strong>{fmtX(adi.mcaptvl_with_ddsc, 2)}</strong>, growth-priced and above the L2 median but defensible: peer to Mantle, Manta, and several other early L2s with restricted distribution. IHC's <strong>$30M institutional transaction</strong> is the named proof that real corporate value is moving through the chain, not just sitting in mint balances. The audit's 206× is real but is measuring DefiLlama's adapter coverage, not ADI Chain. The 90-day work has three parts: (a) submit the DDSC adapter to DefiLlama so the public ratio matches on-chain, (b) keep DDSC issuance and other real TVL growing (the IHC flow shows institutional appetite is real) to compress the ratio toward the L2 median, and (c) address the volume gap (0.15% turnover) on its own track. Float concentration remains a separate disclosure question that the TVL story doesn't solve.
                      </div>

                      <div className="report-footer">
                        <span>ADI · L2 Benchmark</span>
                        <span>End of report · 2 pages</span>
                      </div>
                    </article>

                  </div>
                </>
